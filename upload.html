<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Pipeline — Upload & Results</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#161b22;
    --panel-2:#0d1117;
    --border:#30363d;
    --text:#e6edf3;
    --text-dim:#8b949e;
    --accent:#58a6ff;
    --accent-dim:#1f3a5f;
    --success:#3fb950;
    --danger:#f85149;
    --warning:#d29922;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --mono: ui-monospace, 'SFMono-Regular', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:40px 20px 80px;
    display:flex;
    justify-content:center;
  }
  .wrap{ width:100%; max-width:640px; }

  header{ margin-bottom:24px; }
  header h1{
    font-size:20px;
    font-weight:600;
    margin:0 0 4px;
  }
  header p{
    font-size:13px;
    color:var(--text-dim);
    margin:0;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:20px;
    margin-bottom:16px;
  }
  .card h2{
    font-size:13px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.04em;
    color:var(--text-dim);
    margin:0 0 14px;
  }

  /* upload area */
  .dropzone{
    border:1.5px dashed var(--border);
    border-radius:6px;
    padding:32px 20px;
    text-align:center;
    cursor:pointer;
    display:block;
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--accent);
    background:rgba(88,166,255,0.06);
  }
  .dropzone input{ display:none; }
  .dz-title{ font-size:14px; color:var(--text); margin-bottom:4px; }
  .dz-sub{ font-size:12px; color:var(--text-dim); }

  .file-row{
    display:none;
    align-items:center;
    gap:12px;
    margin-top:14px;
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:6px;
    background:var(--panel-2);
  }
  .file-row img{
    width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);
  }
  .file-name{
    flex:1;
    font-size:13px;
    color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .file-remove{
    font-size:12px;
    color:var(--text-dim);
    background:none;
    border:1px solid var(--border);
    border-radius:5px;
    padding:4px 9px;
    cursor:pointer;
  }
  .file-remove:hover{ color:var(--danger); border-color:var(--danger); }

  button.primary{
    width:100%;
    margin-top:14px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:var(--accent);
    color:#0b1526;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
    transition:filter .15s ease;
  }
  button.primary:hover:not(:disabled){ filter:brightness(1.1); }
  button.primary:disabled{
    background:var(--accent-dim);
    color:#5c7a9c;
    cursor:not-allowed;
  }

  /* status card */
  .status-card{ display:none; }
  .status-card.show{ display:block; }
  .status-line{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13.5px;
    color:var(--text);
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--warning);
    animation:blink 1.1s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes blink{
    0%,100%{opacity:1;} 50%{opacity:.35;}
  }
  .status-line.done .dot{ background:var(--success); animation:none; }
  .status-line.error .dot{ background:var(--danger); animation:none; }
  .job-id{
    margin-top:8px;
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-dim);
    word-break:break-all;
  }

  .error-card{
    display:none;
    border:1px solid var(--danger);
    background:rgba(248,81,73,0.08);
    color:#ffb3ac;
    font-size:13px;
  }
  .error-card.show{ display:block; }

  /* results */
  .results-card{ display:none; }
  .results-card.show{ display:block; }

  .result-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
  }
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    font-weight:600;
    padding:4px 10px;
    border-radius:14px;
  }
  .badge.pass{ background:rgba(63,185,80,0.15); color:var(--success); }
  .badge.fail{ background:rgba(248,81,73,0.15); color:var(--danger); }
  .result-time{ font-size:12px; color:var(--text-dim); }

  .stat-row{
    display:flex;
    gap:16px;
    margin-bottom:18px;
  }
  .stat{
    flex:1;
    border:1px solid var(--border);
    border-radius:6px;
    padding:12px 14px;
    background:var(--panel-2);
  }
  .stat-label{
    font-size:11px;
    color:var(--text-dim);
    text-transform:uppercase;
    letter-spacing:.04em;
    margin-bottom:6px;
  }
  .stat-value{ font-size:18px; font-weight:600; }

  .bar-track{
    height:6px;
    border-radius:3px;
    background:var(--border);
    overflow:hidden;
    margin-top:8px;
  }
  .bar-fill{
    height:100%;
    background:var(--accent);
    width:0%;
    transition:width .5s ease;
  }

  .checks{ display:flex; flex-direction:column; gap:8px; }
  .check-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
    border:1px solid var(--border);
    border-radius:6px;
    padding:10px 12px;
    background:var(--panel-2);
  }
  .check-name{ font-size:13.5px; color:var(--text); }
  .check-detail{ font-size:12px; color:var(--text-dim); margin-top:2px; }
  .check-badge{
    font-size:11px;
    font-weight:600;
    padding:2px 8px;
    border-radius:10px;
    flex-shrink:0;
    white-space:nowrap;
  }
  .check-badge.ok{ background:rgba(63,185,80,0.15); color:var(--success); }
  .check-badge.bad{ background:rgba(248,81,73,0.15); color:var(--danger); }
  .check-badge.neutral{ background:rgba(139,148,158,0.15); color:var(--text-dim); }

  .empty{ font-size:13px; color:var(--text-dim); }

  .api-note{
    text-align:center;
    font-size:11.5px;
    color:var(--text-dim);
    margin-top:8px;
  }
  .api-note code{ color:var(--accent); }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>Media Pipeline</h1>
    <p>Upload an image, then watch the pipeline analyze it in real time.</p>
  </header>

  <div class="card">
    <h2>Upload</h2>
    <label class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*">
      <div class="dz-title">Click to choose a photo, or drag one here</div>
      <div class="dz-sub">JPG or PNG</div>
    </label>

    <div class="file-row" id="fileRow">
      <img id="previewImg" alt="">
      <div class="file-name" id="fileName"></div>
      <button class="file-remove" id="removeBtn">Remove</button>
    </div>

    <button class="primary" id="submitBtn" disabled>Upload & analyze</button>
  </div>

  <div class="card status-card" id="statusCard">
    <h2>Status</h2>
    <div class="status-line" id="statusLine">
      <span class="dot"></span>
      <span id="statusText">Uploading…</span>
    </div>
    <div class="job-id" id="jobIdLine"></div>
  </div>

  <div class="card error-card" id="errorCard"></div>

  <div class="card results-card" id="resultsCard">
    <h2>Results</h2>
    <div class="result-header">
      <span class="badge" id="verdictBadge">—</span>
      <span class="result-time" id="resultTime"></span>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-label">Confidence</div>
        <div class="stat-value" id="confidenceStat">—</div>
        <div class="bar-track"><div class="bar-fill" id="confidenceBar"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="statusStat">—</div>
      </div>
    </div>

    <div class="checks" id="checksList"></div>
  </div>

  <div class="api-note">connected to <code id="apiLabel"></code></div>
</div>

<script>
const API_BASE = "https://gogig-media-pipeline.onrender.com";
const UPLOAD_ENDPOINT = API_BASE + "/api/v1/uploads";
const RESULTS_ENDPOINT = (jobId) => API_BASE + "/api/v1/jobs/" + jobId + "/results";
const POLL_INTERVAL_MS = 2500;
const MAX_POLLS = 60;

document.getElementById('apiLabel').textContent = API_BASE.replace('https://','');

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileRow = document.getElementById('fileRow');
const previewImg = document.getElementById('previewImg');
const fileName = document.getElementById('fileName');
const removeBtn = document.getElementById('removeBtn');
const submitBtn = document.getElementById('submitBtn');
const statusCard = document.getElementById('statusCard');
const statusLine = document.getElementById('statusLine');
const statusText = document.getElementById('statusText');
const jobIdLine = document.getElementById('jobIdLine');
const errorCard = document.getElementById('errorCard');
const resultsCard = document.getElementById('resultsCard');
const verdictBadge = document.getElementById('verdictBadge');
const resultTime = document.getElementById('resultTime');
const confidenceStat = document.getElementById('confidenceStat');
const confidenceBar = document.getElementById('confidenceBar');
const statusStat = document.getElementById('statusStat');
const checksList = document.getElementById('checksList');

let selectedFile = null;
let pollTimer = null;
let pollCount = 0;

function resetPanels(){
  statusCard.classList.remove('show');
  errorCard.classList.remove('show');
  resultsCard.classList.remove('show');
  statusLine.classList.remove('done','error');
  if(pollTimer){ clearTimeout(pollTimer); pollTimer = null; }
  pollCount = 0;
}

function showError(msg){
  errorCard.textContent = msg;
  errorCard.classList.add('show');
}

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  if(e.dataTransfer.files && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
  if(fileInput.files[0]) handleFile(fileInput.files[0]);
});

function handleFile(file){
  if(!file.type.startsWith('image/')){
    showError('Please choose an image file (JPG or PNG).');
    return;
  }
  selectedFile = file;
  fileName.textContent = file.name;
  previewImg.src = URL.createObjectURL(file);
  fileRow.style.display = 'flex';
  submitBtn.disabled = false;
  resetPanels();
}

removeBtn.addEventListener('click', () => {
  selectedFile = null;
  fileInput.value = '';
  fileRow.style.display = 'none';
  submitBtn.disabled = true;
  resetPanels();
});

submitBtn.addEventListener('click', async () => {
  if(!selectedFile) return;
  resetPanels();
  statusCard.classList.add('show');
  statusText.textContent = 'Uploading…';
  submitBtn.disabled = true;

  try{
    const formData = new FormData();
    formData.append('file', selectedFile);

    const uploadRes = await fetch(UPLOAD_ENDPOINT, { method:'POST', body:formData });
    if(!uploadRes.ok){
      const detail = await safeErrorDetail(uploadRes);
      throw new Error('Upload rejected (' + uploadRes.status + '). ' + detail);
    }

    const uploadData = await uploadRes.json();
    const jobId = uploadData.job_id;
    if(!jobId) throw new Error('Server accepted the upload but did not return a job_id.');

    jobIdLine.textContent = 'job_id: ' + jobId;
    statusText.textContent = uploadData.message || 'Queued for processing…';
    pollResults(jobId);

  } catch(err){
    statusLine.classList.add('error');
    statusText.textContent = 'Upload failed';
    showError(err.message || String(err));
    submitBtn.disabled = false;
  }
});

async function safeErrorDetail(res){
  try{
    const data = await res.json();
    if(data && data.detail){
      if(Array.isArray(data.detail)) return data.detail.map(d => d.msg || JSON.stringify(d)).join(' ');
      return String(data.detail);
    }
    return '';
  }catch(e){ return ''; }
}

function pollResults(jobId){
  pollCount++;
  if(pollCount > MAX_POLLS){
    statusLine.classList.add('error');
    statusText.textContent = 'Still processing after a while — check back later.';
    submitBtn.disabled = false;
    return;
  }

  fetch(RESULTS_ENDPOINT(jobId))
    .then(async res => {
      if(res.status === 409){
        // Job exists but isn't finished yet — this API returns 409 while
        // processing, rather than a 200 with a "processing" status.
        return { __stillProcessing: true };
      }
      if(!res.ok){
        const detail = await safeErrorDetail(res);
        throw new Error('Could not fetch results (' + res.status + '). ' + detail);
      }
      return res.json();
    })
    .then(data => {
      if(data.__stillProcessing){
        statusText.textContent = 'Processing…';
        pollTimer = setTimeout(() => pollResults(jobId), POLL_INTERVAL_MS);
        return;
      }

      const status = (data.status || '').toLowerCase();
      const stillGoing = ['queued','pending','processing','running','in_progress'].includes(status);

      if(stillGoing){
        statusText.textContent = 'Processing… (' + (data.status || 'working') + ')';
        pollTimer = setTimeout(() => pollResults(jobId), POLL_INTERVAL_MS);
        return;
      }

      const failed = ['failed','error'].includes(status) || !!data.failure_reason;
      statusLine.classList.add(failed ? 'error' : 'done');
      statusText.textContent = failed ? 'Analysis failed' : 'Analysis complete';
      submitBtn.disabled = false;

      if(failed && data.failure_reason) showError(data.failure_reason);

      renderResult(data);
    })
    .catch(err => {
      statusLine.classList.add('error');
      statusText.textContent = 'Lost track of this job';
      showError(err.message || String(err));
      submitBtn.disabled = false;
    });
}

function renderResult(data){
  resultsCard.classList.add('show');

  const hasIssues = !!data.has_issues;
  verdictBadge.textContent = hasIssues ? '⚑ Issues found' : '✓ Clean';
  verdictBadge.className = 'badge ' + (hasIssues ? 'fail' : 'pass');

  resultTime.textContent = data.processing_completed_at
    ? new Date(data.processing_completed_at).toLocaleString()
    : (data.updated_at ? new Date(data.updated_at).toLocaleString() : '');

  const conf = typeof data.overall_confidence === 'number' ? data.overall_confidence : 0;
  const pct = Math.round((conf <= 1 ? conf * 100 : conf));
  confidenceStat.textContent = pct + '%';
  confidenceBar.style.width = pct + '%';

  statusStat.textContent = data.status || '—';

  checksList.innerHTML = '';
  const checks = Array.isArray(data.checks) ? data.checks : [];

  if(checks.length === 0){
    checksList.innerHTML = '<div class="empty">No individual checks were returned for this job.</div>';
    return;
  }

  checks.forEach(check => {
    // Matches the real AnalysisCheckOut shape:
    // { check_name, passed, severity, confidence, message, details }
    const name = formatCheckName(check.check_name || check.name || 'Check');
    const message = check.message || '';
    const passed = check.passed;
    const severity = check.severity;
    const checkConfidence = typeof check.confidence === 'number' ? Math.round(check.confidence * 100) : null;

    let badgeClass = 'neutral';
    let badgeText = 'INFO';
    if(passed === true){ badgeClass = 'ok'; badgeText = 'PASS'; }
    else if(passed === false){
      badgeClass = 'bad';
      badgeText = severity ? String(severity).toUpperCase() : 'FAIL';
    }

    const metaParts = [];
    if(checkConfidence !== null) metaParts.push(checkConfidence + '% confidence');
    if(severity && passed !== false) metaParts.push('severity: ' + severity);
    const metaLine = metaParts.length ? metaParts.join(' · ') : '';

    const row = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML = `
      <div>
        <div class="check-name">${escapeHtml(name)}</div>
        ${message ? `<div class="check-detail">${escapeHtml(String(message))}</div>` : ''}
        ${metaLine ? `<div class="check-detail">${escapeHtml(metaLine)}</div>` : ''}
      </div>
      <span class="check-badge ${badgeClass}">${escapeHtml(badgeText)}</span>
    `;
    checksList.appendChild(row);
  });
}

function formatCheckName(raw){
  // "blur_detection" -> "Blur detection"
  const spaced = String(raw).replace(/_/g, ' ');
  return spaced.charAt(0).toUpperCase() + spaced.slice(1);
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
